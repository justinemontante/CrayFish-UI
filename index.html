<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CrayCare Splash Screen</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="iphone-frame">
      <div class="dynamic-island"></div>

      <section class="splash-screen" id="splash-screen">
        <div class="logo-container">
          <img
            src="resources/images/logo.png"
            alt="CrayCare Logo"
            class="main-logo"
          />
        </div>

        <div class="brand-info">
          <h1 class="brand-name">
            <span class="text-cray">Cray</span
            ><span class="text-care">Care</span>
          </h1>
          <p class="tagline">Better Care, Better Crayfish</p>
        </div>

        <div class="loading-section">
          <p class="loading-text">Loading...</p>
          <div class="progress-bar">
            <div class="progress-fill"></div>
          </div>
        </div>
      </section>

      <section class="login-screen hidden" id="login-screen">
        <div class="login-logo-container">
          <img
            src="resources/images/logo.png"
            alt="CrayCare Logo"
            class="login-logo"
          />
        </div>
        <h1 class="login-brand-name">
          <span class="text-cray">Cray</span
          ><span class="text-care">Care</span>
        </h1>
        <p class="welcome-text">Welcome back!</p>

        <form class="login-form">
          <div class="input-group">
            <label class="input-label" for="email">Email</label>
            <input
              type="email"
              id="email"
              class="login-input"
              placeholder="Enter your email"
            />
          </div>

          <div class="input-group">
            <label class="input-label" for="password">Password</label>
            <div class="password-wrapper">
              <input
                type="password"
                id="password"
                class="login-input"
                placeholder="Enter your password"
              />
              <button type="button" class="toggle-password" id="toggle-pass">
                <svg
                  class="eye-open"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
                <svg
                  class="eye-closed"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                  <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
              </button>
            </div>
          </div>

          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" id="remember" />
              <span>Remember me</span>
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>

          <button class="login-btn">
            <span>Sign In</span>
          </button>

          <div class="divider-fade">
            <div class="line"></div>
            <span class="or-text">or</span>
            <div class="line"></div>
          </div>

          <button class="google-btn">
            <svg viewBox="0 0 48 48" width="20" height="20">
              <path fill="#4285F4" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
              <path fill="#34A853" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
              <path fill="#EA4335" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            <span>Continue with Google</span>
          </button>
        </form>

        <p class="signup-prompt">
          Don't have an account? <a href="#" class="signup-link" id="go-to-signup">Sign up</a>
        </p>
      </section>

      <!-- SIGN UP SCREEN -->
      <section class="signup-screen hidden" id="signup-screen">
        <div class="login-logo-container">
          <img
            src="resources/images/logo.png"
            alt="CrayCare Logo"
            class="login-logo"
          />
        </div>
        <h1 class="login-brand-name">
          <span class="text-cray">Cray</span
          ><span class="text-care">Care</span>
        </h1>
        <p class="welcome-text">Create an account</p>

        <form class="login-form" id="signup-form">
          <div class="input-group">
            <label class="input-label" for="fullname">Full Name</label>
            <input
              type="text"
              id="fullname"
              class="login-input"
              placeholder="Enter your full name"
            />
          </div>

          <div class="input-group">
            <label class="input-label" for="signup-email">Email</label>
            <input
              type="email"
              id="signup-email"
              class="login-input"
              placeholder="Enter your email"
            />
          </div>

          <div class="input-group">
            <label class="input-label" for="signup-password">Password</label>
            <div class="password-wrapper">
              <input
                type="password"
                id="signup-password"
                class="login-input"
                placeholder="Create a password"
              />
              <button type="button" class="toggle-password" id="toggle-signup-pass">
                <svg
                  class="eye-open"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
                <svg
                  class="eye-closed"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                  <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
              </button>
            </div>
          </div>

          <button class="login-btn" id="signup-submit">
            <span>Sign Up</span>
          </button>

          <div class="divider-fade">
            <div class="line"></div>
            <span class="or-text">or</span>
            <div class="line"></div>
          </div>

          <button class="google-btn" id="google-signup">
            <svg viewBox="0 0 48 48" width="20" height="20">
              <path fill="#4285F4" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
              <path fill="#34A853" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
              <path fill="#EA4335" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            <span>Sign Up with Google</span>
          </button>
        </form>

        <p class="signup-prompt">
          Already have an account? <a href="#" class="signup-link" id="go-to-login">Sign In</a>
        </p>
      </section>

      <!-- VERIFICATION SCREEN -->
      <section class="verify-screen hidden" id="verify-screen">
        <div class="login-logo-container">
          <img
            src="resources/images/logo.png"
            alt="CrayCare Logo"
            class="login-logo"
          />
        </div>
        <h1 class="login-brand-name">
          <span class="text-cray">Verification</span>
        </h1>
        <p class="welcome-text">Enter the 6-digit code sent to your email</p>

        <div class="verify-form">
          <div class="otp-container" id="otp-container">
            <input type="text" class="otp-input" maxlength="1" inputmode="numeric" />
            <input type="text" class="otp-input" maxlength="1" inputmode="numeric" />
            <input type="text" class="otp-input" maxlength="1" inputmode="numeric" />
            <input type="text" class="otp-input" maxlength="1" inputmode="numeric" />
            <input type="text" class="otp-input" maxlength="1" inputmode="numeric" />
            <input type="text" class="otp-input" maxlength="1" inputmode="numeric" />
          </div>
          
          <button class="login-btn" id="verify-submit">
            <span>Verify</span>
          </button>

          <p class="resend-text">
            Didn't receive code? <a href="#" class="resend-link">Resend</a>
          </p>

          <a href="#" class="back-link" id="back-to-signup">Back to Sign Up</a>
        </div>
      </section>
    </div>
    <script src="app.js"></script>
  </body>
</html>
